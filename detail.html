<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title></title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌎</text></svg>">
  <style>
    :root { --bg: #eee; --fg: #000; }
    html, body { height: 100%; }
    body {
      font-family: monospace;
      background-color: var(--bg);
      margin: 0;
      padding: 40px;
      color: var(--fg);
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }
    .bg-image {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
      filter: blur(20px);
      opacity: 0.20;
      z-index: 0;
    }
    .container {
      max-width: 600px;
      text-align: left;
      width: 100%;
      position: relative;
      z-index: 1;
    }
    .title {
      font-size: 32px;
      margin-bottom: 40px;
      letter-spacing: -1px;
      font-weight: bold;
    }
    .blurb {
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 40px;
    }
    .pdf-link {
      font-size: 16px;
      margin-bottom: 60px;
    }
    .pdf-link a {
      color: var(--fg);
      text-decoration: underline;
    }
    .back-link {
      font-size: 14px;
    }
    .back-link a {
      color: var(--fg);
      text-decoration: none;
    }
    .back-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="bg-image" id="bg-image"></div>
  <div class="container">
    <div class="title" id="title"></div>
    <div class="blurb" id="blurb"></div>
    <div class="pdf-link" id="pdf-link"></div>
    <div class="back-link"><a href="index.html">← Back</a></div>
  </div>

  <script>
    async function loadDetail() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');

      if (!id) {
        window.location.href = 'index.html';
        return;
      }

      try {
        const res = await fetch('data/items.json');
        const items = await res.json();
        const item = items[parseInt(id)];

        if (!item) {
          window.location.href = 'index.html';
          return;
        }

        document.title = '';
        document.getElementById('title').textContent = item.title || 'Untitled';
        document.getElementById('blurb').textContent = item.blurb || '';

        const pdfLinkEl = document.getElementById('pdf-link');
        if (item.pdf) {
          pdfLinkEl.innerHTML = `<a href="${item.pdf}" target="_blank">View PDF →</a>`;
        }

        const bgImage = document.getElementById('bg-image');
        if (item.img) {
          bgImage.style.backgroundImage = `url('${item.img}')`;
        }
      } catch (e) {
        console.error('Failed to load item', e);
        window.location.href = 'index.html';
      }
    }

    loadDetail();
  </script>
</body>
</html>
